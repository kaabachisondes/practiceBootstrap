<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Exercice Bootstrap - Boutons</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
</head>
<body>
  <div class="container py-5">
    <h1 class="mb-4">Boutons avec Bootstrap</h1>

    <section class="mb-4">
      <h2 class="h5">Couleurs des boutons</h2>
      <button class="btn btn-primary mr-2 mb-2">Primary</button>
      <button class="btn btn-secondary mr-2 mb-2">Secondary</button>
      <button class="btn btn-success mr-2 mb-2">Success</button>
      <button class="btn btn-danger mr-2 mb-2">Danger</button>
      <button class="btn btn-warning mr-2 mb-2">Warning</button>
      <button class="btn btn-info mr-2 mb-2">Info</button>
      <button class="btn btn-light mb-2">Light</button>
    </section>

    <section class="mb-4">
      <h2 class="h5">Tailles de boutons</h2>
      <button class="btn btn-primary btn-lg mr-2 mb-2">Large</button>
    
      <button class="btn btn-success btn-sm mb-2">Small</button>
    </section>

    <section class="mb-4">
      <h2 class="h5">Bouton large centré</h2>
      <button class="btn btn-outline-primary btn-block">Bouton large</button>
    </section>

    <section>
      <h2 class="h5">Groupe de boutons</h2>
      <div class="btn-group" role="group" aria-label="Groupe de boutons">
        <button class="btn btn-secondary text-uppercase">Un</button>
        <button class="btn btn-secondary text-uppercase">Deux</button>
        <button class="btn btn-secondary text-uppercase">Trois</button>
      </div>
    </section>
  </div>

  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
